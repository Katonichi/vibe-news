services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./data:/app/data
    ports:
      - "5173:5173"
      - "3001:3001"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    tty: true

volumes:
  node_modules:
